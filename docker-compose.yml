version: '3.8'

services:
  backend:
    build: ./backend
    container_name: jobtracker-backend
    ports:
      - "8080:8080"
    volumes:
      - db-data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=default
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jobtracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
    driver: local
