# Server Configuration
server.port=8080

# Database - configured via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobtracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:jobuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Jobtracker2025Secure!}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 Console
spring.h2.console.enabled=false

# JWT Configuration
app.jwt.secret=YourSuperSecretKeyForJWTTokenGeneration2024JobTracker!@#$%^&*()
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=*

# Logging
logging.level.com.jobtracker=INFO
