# Server Configuration
server.port=8080

# H2 Database Configuration (File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/jobtracker_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for direct DB access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=YourSuperSecretKeyForJWTTokenGeneration2024JobTracker!@#$%^&*()
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:80

# Logging
logging.level.com.jobtracker=INFO
